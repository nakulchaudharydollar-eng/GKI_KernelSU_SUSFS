name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config
  
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      # Force Inject All Network, Storage, and Gaming Tweak Configuration Flags
      CONFIG_TARGET="common/arch/arm64/configs/gki_defconfig"
      if [ -f "$CONFIG_TARGET" ]; then
        echo "" >> "$CONFIG_TARGET"
        echo "# --- NETWORK & BBRv3 CONGESTION CONTROL TWEAKS ---" >> "$CONFIG_TARGET"
        echo "CONFIG_TCP_CONG_BBR=y" >> "$CONFIG_TARGET"
        echo "CONFIG_DEFAULT_BBR=y" >> "$CONFIG_TARGET"
        echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> "$CONFIG_TARGET"
        echo "CONFIG_NET_EMATCH=y" >> "$CONFIG_TARGET"
        echo "CONFIG_NET_CLS_ACT=y" >> "$CONFIG_TARGET"
        echo "# --- ADVANCED WIREGUARD VPN ACCELERATION ---" >> "$CONFIG_TARGET"
        echo "CONFIG_WIREGUARD=y" >> "$CONFIG_TARGET"
        echo "# --- GAMING & EAS SCHEDULER LOW LATENCY TWEAKS ---" >> "$CONFIG_TARGET"
        echo "CONFIG_SCHED_AUTOGROUP=y" >> "$CONFIG_TARGET"
        echo "CONFIG_SCHED_HRTICK=y" >> "$CONFIG_TARGET"
        echo "# --- STORAGE I/O HANDLING & F2FS FLASH TUNING ---" >> "$CONFIG_TARGET"
        echo "CONFIG_F2FS_FS_XATTR=y" >> "$CONFIG_TARGET"
        echo "CONFIG_F2FS_FS_SECURITY=y" >> "$CONFIG_TARGET"
        echo "CONFIG_F2FS_CHECK_FS=n" >> "$CONFIG_TARGET"
        echo "All custom optimizations successfully appended to defconfig structure."
      fi

      # Unpack-Phase Injection: Export ZeroMount VFS symbols via Python Engine
      python3 -c "
      import os
      file_path = 'common/fs/namei.c'
      if not os.path.exists(file_path):
          file_path = 'fs/namei.c'
      
      if os.path.exists(file_path):
          with open(file_path, 'r') as f:
              content = f.read()
          
          target = 'sys_fstatat(int dfd, const char __user *filename, struct stat __user *bf)\n{\n\treturn do_fstatat(dfd, filename, bf, 0);\n}'
          if target not in content:
              target = 'sys_fstatat(int dfd, const char __user *filename, struct stat __user *bf)'
          
          if target in content and 'EXPORT_SYMBOL(sys_fstatat);' not in content:
              content = content.replace(target, target + '\nEXPORT_SYMBOL(sys_fstatat);\n')
              with open(file_path, 'w') as f:
                  f.write(content)
              print('ZeroMount VFS Driver symbol successfully exported via Python Engine.')
          else:
              print('ZeroMount symbol already present or matching bypassed.')
      else:
          print('Warning: VFS source files not found in active workspace scope.')
      "

      cat common/arch/arm64/configs/gki_defconfig
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

      cat /home/runner/out/common/.config || true

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ -f "/home/runner/out/dist/Image" ]; then
        echo "Found Image at /home/runner/out/dist/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Image"
          echo "Kernel Version:"
          strings "/home/runner/out/dist/Image" | grep -m1 "^Linux version "
        fi
          exit 0
        fi
      if [ -f "/home/runner/out/Image" ]; then
        echo "Found Image at /home/runner/out/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi

      exit 1

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch

